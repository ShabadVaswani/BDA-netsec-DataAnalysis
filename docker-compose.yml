services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: bda-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

  cassandra:
    image: cassandra:5.0
    container_name: bda-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=bda-streaming
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: unless-stopped

  spark-master:
    image: bitnami/spark:3.5
    container_name: bda-spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MODE=master
    volumes:
      - ./:/workspace
    restart: unless-stopped

  spark-worker:
    image: bitnami/spark:3.5
    container_name: bda-spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./:/workspace
    restart: unless-stopped

  spark-submit:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: bda-spark-submit
    depends_on:
      - kafka
      - cassandra
      - spark-master
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["sleep", "infinity"]
    profiles: ["tools"]

  routersense-producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: bda-routersense-producer
    depends_on:
      - kafka
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["sleep", "infinity"]
    profiles: ["tools"]

volumes:
  kafka_data:
  cassandra_data:
